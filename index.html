<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMBY · TODO EN UN MISMO LUGAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #f0f0f0;
            padding: 20px;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 10% 20%, rgba(106, 0, 255, 0.06) 0%, transparent 50%),
                              radial-gradient(ellipse at 90% 80%, rgba(0, 164, 255, 0.06) 0%, transparent 50%);
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 30px 20px 16px;
            background: rgba(16, 16, 32, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 30px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #00a4ff, #6a00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            background: linear-gradient(135deg, #6a00ff, #00a4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-sub {
            color: #b0b0c0;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            margin-top: 4px;
            opacity: 0.8;
        }

        /* BOTONES */
        .tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 44px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #b0b0c0;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }

        .tab-btn i {
            font-size: 1.2rem;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00a4ff, #6a00ff);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 8px 28px rgba(0, 164, 255, 0.25);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            padding: 4px 0;
        }

        .card-item {
            background: rgba(20, 20, 40, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            cursor: default;
            position: relative;
        }

        .card-item:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0, 164, 255, 0.3);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
        }

        .card-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
            background: #12121f;
        }

        .card-info {
            padding: 12px 14px 16px;
        }

        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f0f0f0;
        }

        .card-year {
            font-size: 0.8rem;
            color: #8888aa;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-year i {
            font-size: 0.7rem;
            color: #00a4ff;
        }

        .badge-type {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .badge-type.movie {
            background: rgba(0, 164, 255, 0.2);
            color: #66ccff;
        }

        .badge-type.series {
            background: rgba(106, 0, 255, 0.2);
            color: #b388ff;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #b0b0c0;
        }

        .empty-state i {
            font-size: 3.5rem;
            opacity: 0.2;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-weight: 500;
            font-size: 1.2rem;
            color: #f0f0f0;
            margin-bottom: 6px;
        }

        .loading-spinner {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 0;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.06);
            border-top-color: #00a4ff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* scroll */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: #00a4ff;
            border-radius: 12px;
        }

        /* responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 2.2rem; }
            .tab-btn { padding: 12px 24px; font-size: 0.95rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
        }

        @media (max-width: 400px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-tv"></i> EMBY</h1>
        <div class="header-sub">TODO EN UN MISMO LUGAR</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-type="movies"><i class="fas fa-film"></i> Películas</button>
        <button class="tab-btn" data-type="series"><i class="fas fa-tv"></i> Series</button>
    </div>

    <div id="catalogGrid" class="grid">
        <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
</div>

<script>
    (function(){
        // ─── CONFIGURACIÓN ──────────────────────────────────────────
        const API_KEY = 'd4f8955e60014f1d910f302a822544ec';
        const LOCAL_IP = localStorage.getItem('embyLocalIp') || 'http://192.168.1.64:8096';
        const REMOTE_URL = 'http://mxcuentas.ddns.net:8096';

        let currentType = 'movies';
        let allItems = [];
        let currentBaseUrl = '';

        // DOM
        const grid = document.getElementById('catalogGrid');

        // ─── UTILIDADES ─────────────────────────────────────────────
        function getActiveUrl() {
            return new Promise((resolve) => {
                const localUrl = `${LOCAL_IP}/emby/System/Info/Public`;
                fetch(localUrl, { headers: { 'X-Emby-Token': API_KEY }, signal: AbortSignal.timeout(2500) })
                    .then(r => r.ok ? resolve(LOCAL_IP) : resolve(REMOTE_URL))
                    .catch(() => resolve(REMOTE_URL));
            });
        }

        function buildPosterUrl(itemId, baseUrl, type) {
            if (type === 'Series') {
                return `${baseUrl}/emby/Items/${itemId}/Images/Primary?maxHeight=400&quality=80&tag=${Date.now()}`;
            }
            return `${baseUrl}/emby/Items/${itemId}/Images/Primary?maxHeight=400&quality=80&tag=${Date.now()}`;
        }

        // ─── OBTENER CATÁLOGO COMPLETO ─────────────────────────────
        async function fetchCatalog() {
            try {
                const baseUrl = await getActiveUrl();
                currentBaseUrl = baseUrl;
                const url = `${baseUrl}/emby/Items?api_key=${API_KEY}&Recursive=true&IncludeItemTypes=Movie,Series&Fields=ProductionYear,DateCreated,OfficialRating,CommunityRating,ImageTags,DateAdded,PremiereDate&SortBy=DateCreated,ProductionYear&SortOrder=Descending`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                return { items: data.Items || [], baseUrl };
            } catch (e) {
                console.error('Error al obtener catálogo:', e);
                return { items: [], baseUrl: null };
            }
        }

        // ─── OBTENER AÑO CORRECTO ──────────────────────────────────
        function getItemYear(item) {
            // Prioridad: PremiereDate > ProductionYear > DateCreated
            if (item.PremiereDate) {
                const year = new Date(item.PremiereDate).getFullYear();
                if (!isNaN(year) && year > 1900) return year;
            }
            if (item.ProductionYear && item.ProductionYear > 1900) {
                return item.ProductionYear;
            }
            if (item.DateCreated) {
                const year = new Date(item.DateCreated).getFullYear();
                if (!isNaN(year) && year > 1900) return year;
            }
            return null;
        }

        // ─── RENDER ─────────────────────────────────────────────────
        function render(items, baseUrl) {
            // Filtrar por tipo
            let filteredItems = items.filter(item => {
                if (currentType === 'movies') return item.Type === 'Movie';
                if (currentType === 'series') return item.Type === 'Series';
                return false;
            });

            // Obtener año para cada item y ordenar por año (más reciente primero)
            // y dentro del mismo año por fecha de creación (más reciente primero)
            const itemsWithYear = filteredItems.map(item => {
                const year = getItemYear(item);
                // Si no tiene año válido, usar 0 para que vaya al final
                const validYear = (year && year > 1900) ? year : 0;
                // Para ordenar dentro del mismo año, usar DateCreated o DateAdded
                const sortDate = item.DateAdded || item.DateCreated || '';
                return { ...item, _year: validYear, _sortDate: sortDate };
            });

            // Ordenar: primero por año descendente, luego por fecha descendente
            itemsWithYear.sort((a, b) => {
                if (a._year !== b._year) {
                    return b._year - a._year;
                }
                // Si mismo año, comparar por fecha
                const dateA = a._sortDate ? new Date(a._sortDate).getTime() : 0;
                const dateB = b._sortDate ? new Date(b._sortDate).getTime() : 0;
                return dateB - dateA;
            });

            if (!itemsWithYear || itemsWithYear.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <h3>Sin contenido</h3>
                        <p>No se encontraron ${currentType === 'movies' ? 'películas' : 'series'} en el servidor</p>
                    </div>
                `;
                return;
            }

            let html = '';

            for (const item of itemsWithYear) {
                const title = item.Name || 'Sin título';
                const year = item._year;
                const displayYear = year > 0 ? year : '';
                const badge = item.Type === 'Movie' ? 'movie' : 'series';
                const badgeLabel = item.Type === 'Movie' ? 'Película' : 'Serie';
                const itemType = item.Type === 'Movie' ? 'Movie' : 'Series';
                
                const imageUrl = buildPosterUrl(item.Id, baseUrl, itemType);

                let imageHtml = '';
                if (itemType === 'Series') {
                    const primaryUrl = `${baseUrl}/emby/Items/${item.Id}/Images/Primary?maxHeight=400&quality=80&tag=${Date.now()}`;
                    const thumbUrl = `${baseUrl}/emby/Items/${item.Id}/Images/Thumb?maxHeight=400&quality=80&tag=${Date.now()}`;
                    const logoUrl = `${baseUrl}/emby/Items/${item.Id}/Images/Logo?maxHeight=400&quality=80&tag=${Date.now()}`;
                    
                    imageHtml = `
                        <img class="card-poster" 
                             src="${primaryUrl}" 
                             alt="${title}" 
                             loading="lazy"
                             onerror="this.onerror=null; this.src='${thumbUrl}';"
                             onerror="this.onerror=null; this.src='${logoUrl}';"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22%3E%3Crect fill=%22%2312121f%22 width=%22200%22 height=%22300%22/%3E%3Ctext x=%22100%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%23333%22 font-size=%2216%22 font-family=%22sans-serif%22%3ESin imagen%3C/text%3E%3C/svg%3E'">
                    `;
                } else {
                    imageHtml = `
                        <img class="card-poster" 
                             src="${imageUrl}" 
                             alt="${title}" 
                             loading="lazy"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22%3E%3Crect fill=%22%2312121f%22 width=%22200%22 height=%22300%22/%3E%3Ctext x=%22100%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%23333%22 font-size=%2216%22 font-family=%22sans-serif%22%3ESin imagen%3C/text%3E%3C/svg%3E'">
                    `;
                }

                html += `
                    <div class="card-item">
                        ${imageHtml}
                        <div class="badge-type ${badge}">${badgeLabel}</div>
                        <div class="card-info">
                            <div class="card-title">${title}</div>
                            <div class="card-year"><i class="fas fa-calendar-alt"></i> ${displayYear || 'Año desconocido'}</div>
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html;
        }

        // ─── CARGAR Y MOSTRAR ──────────────────────────────────────
        async function loadAndRender(type) {
            currentType = type;
            grid.innerHTML = `<div class="loading-spinner"><div class="spinner"></div></div>`;

            const { items, baseUrl } = await fetchCatalog();
            if (!items || items.length === 0 || !baseUrl) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>No se pudo conectar</h3>
                        <p>Verifica la IP de Emby o revisa la conexión</p>
                    </div>
                `;
                return;
            }

            allItems = items;
            render(items, baseUrl);
        }

        // ─── CAMBIO DE PESTAÑA ─────────────────────────────────────
        function switchTab(type) {
            if (type === currentType) return;
            currentType = type;
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            
            if (allItems && allItems.length > 0) {
                render(allItems, currentBaseUrl);
            } else {
                loadAndRender(type);
            }
        }

        // ─── EVENTOS ────────────────────────────────────────────────
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const type = this.dataset.type;
                switchTab(type);
            });
        });

        // ─── INICIO ──────────────────────────────────────────────────
        loadAndRender('movies');
    })();
</script>
</body>
</html>
